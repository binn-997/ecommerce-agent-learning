services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ecommerce_ai
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: change-me-in-real-use
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d ecommerce_ai"]
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  postgres_data:
