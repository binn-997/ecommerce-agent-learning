name: portfolio-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check amazon_ai_platform tests
      - run: pytest
      - run: python -m amazon_ai_platform.listing_agent > /tmp/listing-demo.json
